name: Auto-merge claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge branch into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin main
          git checkout main

          echo "Tento merge diretto di $BRANCH in main..."
          if git merge --no-ff "origin/$BRANCH" -m "Auto-merge $BRANCH in main"; then
            git push origin main
            echo "Merge e push completati con successo"
          else
            echo "Merge fallito (conflitti), provo via PR..."
            git merge --abort 2>/dev/null || true
            git checkout "$BRANCH"

            # Cerca PR aperta esistente
            PR=$(gh pr list --repo "$REPO" --base main --head "$BRANCH" \
              --state open --json number -q '.[0].number' 2>/dev/null || echo "")

            if [ -z "$PR" ]; then
              PR=$(gh pr create \
                --repo "$REPO" \
                --base main \
                --head "$BRANCH" \
                --title "Claude: sync $BRANCH" \
                --body "PR automatica da Claude Code." \
                --json number -q '.number')
              echo "PR creata: #$PR"
            else
              echo "PR esistente: #$PR"
            fi

            gh api "repos/$REPO/pulls/$PR/merge" \
              --method PUT \
              -f merge_method=merge \
              -f commit_title="Auto-merge PR #$PR da $BRANCH" \
              && echo "PR merge completato"
          fi
